name: Sync Tarbel Extractions

on:
  schedule:
    # Run at 01:45 Brussels in summer (CEST=UTC+2) / 00:45 in winter (CET=UTC+1) → 23:45 UTC
    - cron: '45 23 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-download even if file already exists in the release'
        type: boolean
        default: false

permissions:
  contents: write  # needed to create releases and upload assets

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get already-uploaded release assets
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(date -u +'%Y-%m')
          # List asset names already in this month's release; empty string if release doesn't exist yet
          assets=$(gh release view "$tag" --json assets --jq '[.assets[].name] | join(",")' 2>/dev/null || echo "")
          echo "assets=$assets" >> "$GITHUB_OUTPUT"
          echo "Existing assets: $assets"

      - name: Download extractions from minfin
        shell: pwsh
        run: |
          $force = '${{ github.event.inputs.force }}' -eq 'true'
          $skipFiles = ('${{ steps.existing.outputs.assets }}' -split ',' | Where-Object { $_ -ne '' })
          $params = @{ OutputFolder = './downloads'; SkipFiles = $skipFiles }
          if ($force) { $params['Force'] = $true; $params['SkipFiles'] = @() }
          ./download.ps1 @params

      - name: Download XML documentation
        shell: pwsh
        run: |
          $skipFiles = ('${{ steps.existing.outputs.assets }}' -split ',')
          $alreadyHaveDoc = $skipFiles -contains 'XML-Document.zip'
          $force = '${{ github.event.inputs.force }}' -eq 'true'
          if (-not $alreadyHaveDoc -or $force) {
            ./download.ps1 -DownloadDocumentation -OutputFolder './downloads' -Force:$force
          } else {
            Write-Host "XML-Document.zip already in release, skipping."
          }

      - name: Download currency rates
        shell: pwsh
        run: |
          $skipFiles = ('${{ steps.existing.outputs.assets }}' -split ',')
          $alreadyHaveCurrencies = $skipFiles -contains 'listed_currencies.xlsx'
          $force = '${{ github.event.inputs.force }}' -eq 'true'
          if (-not $alreadyHaveCurrencies -or $force) {
            ./download.ps1 -DownloadCurrencies -OutputFolder './downloads' -Force:$force
          } else {
            Write-Host "listed_currencies.xlsx already in release, skipping."
          }

      - name: List downloaded files
        run: ls -lh downloads/ || echo "No files downloaded"

      - name: Determine release tag (year-month)
        id: tag
        run: echo "tag=$(date -u +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            Tarbel extractions from minfin for ${{ steps.tag.outputs.tag }}.

            One full extraction on the 1st of the month + daily delta files.
            Downloaded automatically from https://eservices.minfin.fgov.be/extTariffBrowser/XmlExtractions
          files: |
            downloads/*.zip
            downloads/*.xlsx
          fail_on_unmatched_files: false
          # Only new files reach this step — existing assets were skipped during download.
